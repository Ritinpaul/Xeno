version: "3.9"

services:

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:password@db.supabase.co:5432/postgres}
      APP_ID: bloom-crm
      APP_SECRET: change-this-in-production
